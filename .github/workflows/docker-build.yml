name: Build & Push

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Go Build & Vet ─────────────────────────────────────────────
  go-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build binary
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o weekly-report .

  # ── Container Image ────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: go-build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository }}/weekly-report:latest
            ghcr.io/${{ github.repository }}/weekly-report:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/weekly-report:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/weekly-report:buildcache,mode=max
