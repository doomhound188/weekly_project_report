version: '3.8'

services:
  # Web Interface Service
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: weekly-report-web-go
    restart: unless-stopped

    # Mount environment file
    env_file:
      - .env

    # Port mapping for web interface
    ports:
      - "5000:5000"

    # Mount volumes for report output
    volumes:
      - ./reports:/app/reports

    # Environment variables
    environment:
      - TZ=America/Toronto
      - WEB_PORT=5000
      - WEB_HOST=0.0.0.0

    # Health check
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Cron Service (scheduled CLI reports)
  cron:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: weekly-report-cron-go
    restart: unless-stopped
    command: ["--cli", "--mode", "auto"]

    # Mount environment file
    env_file:
      - .env

    # Mount volumes for report output
    volumes:
      - ./reports:/app/reports

    # Environment variables
    environment:
      - TZ=America/Toronto

# Usage:
#   podman-compose up web          # Web interface only
#   podman-compose up cron         # Scheduled CLI only
#   podman-compose up              # Both services
#   podman-compose run --rm web --cli  # One-off CLI
